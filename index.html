<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Drop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --border-hover: #30363d;
      --accent: #6e76ff;
      --accent-soft: rgba(110, 118, 255, 0.10);
      --accent-glow: rgba(110, 118, 255, 0.3);
      --text: #e6edf3;
      --muted: #7d8590;
      --success: #3fb950;
      --error: #f85149;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 5rem;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }

    .drop-zone {
      width: 100%; max-width: 520px;
      min-height: 240px;
      border-radius: 14px;
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; cursor: pointer;
      border: 2px dashed var(--border);
      transition: background 0.2s, border-color 0.2s;
      animation: pulse-glow 3.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50%       { box-shadow: 0 0 0 8px transparent; }
    }

    .drop-zone.dragging {
      border-color: var(--accent);
      background: var(--accent-soft);
      animation: none;
    }
    .drop-zone.busy { animation: none; cursor: default; pointer-events: none; }

    .drop-icon { width: 48px; height: 48px; opacity: 0.45; transition: transform 0.2s, opacity 0.2s; color: var(--accent); }
    .drop-zone.dragging .drop-icon { opacity: 0.9; transform: translateY(-4px) scale(1.08); }

    .drop-label { font-size: 1rem; font-weight: 500; }
    .drop-sub   { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); }

    .browse-btn {
      padding: 0.45rem 1.3rem; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem; font-family: var(--sans);
      cursor: pointer; margin-top: 0.3rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .browse-btn:hover { border-color: var(--accent); color: var(--accent); }
    .file-input { display: none; }

    .status-area {
      width: 100%; max-width: 520px;
      margin-top: 1.2rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      min-height: 40px;
    }

    .progress-wrap { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; display: none; }
    .progress-bar  { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s ease; border-radius: 99px; }
    .status-text   { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); }
    .error-msg     { font-size: 0.78rem; color: var(--error); font-family: var(--mono); display: none; }
    .error-msg.on  { display: block; }

    .storage-bar-wrap {
      width: 100%; max-width: 520px;
      margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.35rem;
    }
    .storage-label { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); display: flex; justify-content: space-between; }
    .storage-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .storage-fill  { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

    .history-section { width: 100%; max-width: 520px; margin-top: 2.5rem; }

    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.9rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .history-title {
      font-family: var(--mono); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
    }

    .file-count {
      font-family: var(--mono); font-size: 0.7rem; color: var(--accent);
      background: var(--accent-soft); padding: 0.15rem 0.5rem;
      border-radius: 99px; margin-left: 0.5rem;
    }

    .history-actions { display: flex; gap: 0.6rem; align-items: center; }

    .hdr-btn {
      font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0;
      opacity: 0.6; transition: color 0.2s, opacity 0.2s;
    }
    .hdr-btn:hover { opacity: 1; }
    .hdr-btn.danger:hover { color: var(--error); }

    .search-wrap {
      width: 100%; max-width: 520px; margin-top: 0; margin-bottom: 0.8rem;
      display: none;
    }
    .search-wrap.visible { display: block; }
    .search-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 0.85rem;
      font-size: 0.8rem; font-family: var(--mono); color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .history-empty {
      text-align: center; padding: 2.2rem 0;
      color: var(--muted); font-size: 0.78rem; font-family: var(--mono);
      border: 1px dashed var(--border); border-radius: 12px; opacity: 0.6;
    }

    .history-list { display: flex; flex-direction: column; gap: 0.45rem; }

    .history-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.8rem 0.95rem;
      display: flex; align-items: center; gap: 0.85rem;
      transition: border-color 0.18s;
      animation: slide-in 0.22s ease;
    }
    .history-item:hover { border-color: var(--border-hover); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--accent-soft); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }

    .item-body { flex: 1; min-width: 0; }
    .item-name {
      font-size: 0.82rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 0.18rem;
    }
    .item-meta { font-size: 0.7rem; font-family: var(--mono); color: var(--muted); }

    .item-btns { display: flex; gap: 0.35rem; flex-shrink: 0; }

    .ibtn {
      padding: 0.32rem 0.65rem; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.7rem;
      font-family: var(--sans); cursor: pointer; white-space: nowrap;
      transition: border-color 0.18s, color 0.18s;
    }
    .ibtn:hover     { border-color: var(--accent); color: var(--accent); }
    .ibtn.dl:hover  { border-color: var(--success); color: var(--success); }
    .ibtn.del:hover { border-color: var(--error);   color: var(--error); }

    footer {
      margin-top: 3.5rem; font-size: 0.7rem;
      color: var(--muted); font-family: var(--mono); opacity: 0.4;
      text-align: center;
    }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.55rem 1.1rem;
      font-size: 0.78rem; font-family: var(--mono); color: var(--text);
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap; z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .db-badge {
      font-family: var(--mono); font-size: 0.65rem; color: var(--success);
      border: 1px solid rgba(63,185,80,0.3); border-radius: 4px;
      padding: 0.1rem 0.4rem; margin-left: 0.6rem; vertical-align: middle;
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      .item-btns { flex-direction: column; }
      .ibtn { font-size: 0.65rem; padding: 0.28rem 0.5rem; }
    }
  </style>
</head>
<body>

<div class="wordmark">pdf//drop <span class="db-badge">IndexedDB</span></div>

<div class="drop-zone" id="dropZone">
  <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="18" x2="12" y2="12"/>
    <polyline points="9 15 12 12 15 15"/>
  </svg>
  <span class="drop-label">Drop your files here</span>
  <span class="drop-sub">PDF & ZIP · stored locally · no limit</span>
  <button class="browse-btn" id="browseBtn">or browse files</button>
  <input type="file" accept="application/pdf,.zip,application/zip,application/x-zip-compressed" class="file-input" id="fileInput" multiple />
</div>

<div class="status-area">
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-text" id="statusText"></div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="storage-bar-wrap">
  <div class="storage-label">
    <span>storage used</span>
    <span id="storageLabel">calculating…</span>
  </div>
  <div class="storage-track"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
</div>

<div class="history-section">
  <div class="history-header">
    <span class="history-title">
      Uploaded files
      <span class="file-count" id="fileCount" style="display:none">0</span>
    </span>
    <div class="history-actions">
      <button class="hdr-btn" id="exportBtn" style="display:none">export all</button>
      <button class="hdr-btn danger" id="clearBtn" style="display:none">clear all</button>
    </div>
  </div>
  <div class="search-wrap" id="searchWrap">
    <input type="text" class="search-input" id="searchInput" placeholder="search files…" />
  </div>
  <div class="history-empty" id="historyEmpty">no files yet — drop one above</div>
  <div class="history-list" id="historyList"></div>
</div>

<footer>powered by IndexedDB · no server · no size limit · PDF & ZIP · files stay on this device</footer>
<div class="toast" id="toast"></div>

<script>
  // ── IndexedDB setup ──
  const DB_NAME    = 'pdfdrop';
  const DB_VERSION = 1;
  const STORE      = 'files';
  let db;

  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) {
          const store = d.createObjectStore(STORE, { keyPath: 'id' });
          store.createIndex('date', 'timestamp', { unique: false });
        }
      };
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror   = e => rej(e.target.error);
    });
  }

  function dbGetAll() {
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).index('date').getAll();
      req.onsuccess = e => res(e.target.result.reverse()); // newest first
      req.onerror   = e => rej(e.target.error);
    });
  }

  function dbPut(record) {
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put(record);
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
    });
  }

  function dbDelete(id) {
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).delete(id);
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
    });
  }

  function dbClear() {
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).clear();
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
    });
  }

  function dbGetByName(name) {
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = e => res(e.target.result.find(f => f.name === name) || null);
      req.onerror   = e => rej(e.target.error);
    });
  }

  // ── DOM ──
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const browseBtn   = document.getElementById('browseBtn');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const statusText  = document.getElementById('statusText');
  const errorMsg    = document.getElementById('errorMsg');
  const historyList = document.getElementById('historyList');
  const historyEmpty= document.getElementById('historyEmpty');
  const fileCount   = document.getElementById('fileCount');
  const clearBtn    = document.getElementById('clearBtn');
  const exportBtn   = document.getElementById('exportBtn');
  const storageFill = document.getElementById('storageFill');
  const storageLabel= document.getElementById('storageLabel');
  const searchWrap  = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');
  const toast       = document.getElementById('toast');

  let allFiles = [];
  let searchQuery = '';

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  // ── Storage estimate ──
  async function updateStorageMeter() {
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const { usage, quota } = await navigator.storage.estimate();
        const pct = Math.min((usage / quota) * 100, 100);
        storageFill.style.width = pct + '%';
        storageLabel.textContent = formatSize(usage) + ' / ' + formatSize(quota);
      } else {
        // Fallback: estimate from file sizes
        const total = allFiles.reduce((s, f) => s + (f.fileSize || 0), 0);
        storageFill.style.width = '0%';
        storageLabel.textContent = formatSize(total) + ' stored';
      }
    } catch { storageLabel.textContent = '—'; }
  }

  // ── Render ──
  async function render() {
    allFiles = await dbGetAll();
    const query = searchQuery.toLowerCase();
    const shown = query ? allFiles.filter(f => f.name.toLowerCase().includes(query)) : allFiles;

    historyList.innerHTML = '';

    const hasFiles = allFiles.length > 0;
    historyEmpty.style.display = shown.length ? 'none' : 'block';
    historyEmpty.textContent   = hasFiles && !shown.length ? 'no files match your search' : 'no files yet — drop one above';
    clearBtn.style.display     = hasFiles ? 'block' : 'none';
    exportBtn.style.display    = hasFiles ? 'block' : 'none';
    searchWrap.classList.toggle('visible', hasFiles);
    fileCount.style.display    = hasFiles ? 'inline' : 'none';
    fileCount.textContent      = allFiles.length;

    shown.forEach(f => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const isZip = f.name.endsWith('.zip');
      item.innerHTML = `
        <div class="item-icon">
          ${isZip
            ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/><rect x="10" y="10" width="4" height="8" rx="1"/></svg>`
            : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`
          }
        </div>
        <div class="item-body">
          <div class="item-name" title="${esc(f.name)}">${esc(f.name)}</div>
          <div class="item-meta">${f.date} · ${f.size}</div>
        </div>
        <div class="item-btns">
          <button class="ibtn dl">Download</button>
          <button class="ibtn del">✕</button>
        </div>`;

      item.querySelector('.dl').addEventListener('click',  () => downloadFile(f));
      item.querySelector('.del').addEventListener('click', () => deleteFile(f.id, f.name));
      historyList.appendChild(item);
    });

    updateStorageMeter();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Download ──
  function downloadFile(f) {
    const blob = new Blob([f.buffer], { type: f.mimeType || 'application/octet-stream' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = f.name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast('Downloading ' + f.name);
  }

  // ── Delete ──
  async function deleteFile(id, name) {
    await dbDelete(id);
    await render();
    showToast(name + ' deleted');
  }

  // ── Clear all ──
  clearBtn.addEventListener('click', async () => {
    if (confirm('Delete all stored files? This cannot be undone.')) {
      await dbClear();
      await render();
      showToast('All files cleared');
    }
  });

  // ── Export all ──
  exportBtn.addEventListener('click', () => {
    if (!allFiles.length) return;
    allFiles.forEach((f, i) => setTimeout(() => downloadFile(f), i * 500));
    showToast('Downloading ' + allFiles.length + ' file' + (allFiles.length > 1 ? 's' : ''));
  });

  // ── Search ──
  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    render();
  });

  // ── Drop / input ──
  browseBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFiles([...fileInput.files]); });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('dragging'); });
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragging');
    const ALLOWED = ['application/pdf', 'application/zip', 'application/x-zip-compressed', 'application/x-zip'];
    const pdfs = [...e.dataTransfer.files].filter(f => ALLOWED.includes(f.type) || f.name.endsWith('.zip') || f.name.endsWith('.pdf'));
    if (!pdfs.length) { showError('Only PDF and ZIP files are supported.'); return; }
    handleFiles(pdfs);
  });
  dropZone.addEventListener('click', e => { if (!e.target.closest('.browse-btn')) fileInput.click(); });

  // ── Handle files ──
  async function handleFiles(list) {
    dropZone.classList.add('busy');
    errorMsg.classList.remove('on');
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';

    let saved = 0;
    for (let i = 0; i < list.length; i++) {
      const file = list[i];
      statusText.textContent = `saving ${file.name}…`;
      animateProgress((i / list.length) * 100, ((i + 0.7) / list.length) * 100, 350);

      try {
        // Read as ArrayBuffer — more efficient than base64
        const buffer = await fileToBuffer(file);

        // Duplicate check
        const existing = await dbGetByName(file.name);
        if (existing) {
          const overwrite = confirm(`"${file.name}" already exists. Replace it?`);
          if (overwrite) await dbDelete(existing.id);
          else continue;
        }

        const record = {
          id:        Date.now() + '_' + Math.random().toString(36).slice(2),
          name:      file.name,
          size:      formatSize(file.size),
          fileSize:  file.size,
          date:      new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }),
          timestamp: Date.now(),
          mimeType:  file.type || 'application/octet-stream',
          buffer:    buffer
        };

        await dbPut(record);
        saved++;
        animateProgress(((i + 0.7) / list.length) * 100, ((i + 1) / list.length) * 100, 150);

      } catch (err) {
        console.error(err);
        showError('Failed to save "' + file.name + '" — ' + (err.message || 'unknown error'));
      }
    }

    setTimeout(async () => {
      progressWrap.style.display = 'none';
      progressBar.style.width = '0%';
      statusText.textContent = '';
      dropZone.classList.remove('busy');
      fileInput.value = '';
      await render();
      if (saved > 0) showToast(saved === 1 ? list[0].name + ' saved' : saved + ' files saved');
    }, 350);
  }

  // ── Helpers ──
  function fileToBuffer(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error('Read failed'));
      r.readAsArrayBuffer(file);
    });
  }

  function formatSize(bytes) {
    if (bytes < 1024)        return bytes + ' B';
    if (bytes < 1048576)     return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824)  return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(1) + ' GB';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('on');
    dropZone.classList.remove('busy');
    progressWrap.style.display = 'none';
    statusText.textContent = '';
  }

  let progTimer;
  function animateProgress(from, to, dur) {
    clearInterval(progTimer);
    const steps = 25, step = (to - from) / steps, delay = dur / steps;
    let cur = from;
    progressBar.style.width = from + '%';
    progTimer = setInterval(() => {
      cur += step;
      if (cur >= to) { cur = to; clearInterval(progTimer); }
      progressBar.style.width = cur + '%';
    }, delay);
  }

  // ── Init ──
  openDB()
    .then(() => render())
    .catch(err => showError('Could not open database: ' + err.message));
</script>
</body>
</html>
